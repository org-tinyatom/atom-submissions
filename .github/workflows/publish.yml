# Post-merge publish for the official TinyAtom catalog. SECURITY: this workflow holds the owner signing
# key, so it triggers ONLY on push to main (a merged, human-reviewed submission) — never on pull_request,
# where a fork could exfiltrate secrets or publish unreviewed code.
#
# The publish tooling is vendored in this repo under tools/ (see tools/README.md), so no external repo is
# checked out. Required repository secrets:
#   TINYATOM_OWNER_PRIVATE_KEY_PEM  — the owner Ed25519 PRIVATE key (PEM text). Signs manifests + catalog.
#   CATALOG_PUSH_TOKEN              — a token with contents:write on org-tinyatom/atoms-catalog.
name: Publish merged atoms

on:
  push:
    branches: [main]
    paths: ['submissions/**']
  workflow_dispatch: {}   # manual "(re)publish everything" — e.g. after fixing the workflow

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out submissions (with the vendored tools/)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out the catalog repo
        uses: actions/checkout@v4
        with:
          repository: org-tinyatom/atoms-catalog
          path: atoms-catalog
          token: ${{ secrets.CATALOG_PUSH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # tools/lib/atom-publish.mjs needs only the `tar` package.
      - name: Install script dependency
        run: npm install --no-save tar

      - name: Publish each merged submission
        env:
          TINYATOM_OWNER_PRIVATE_KEY_PEM: ${{ secrets.TINYATOM_OWNER_PRIVATE_KEY_PEM }}
          GH_TOKEN: ${{ secrets.CATALOG_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          # Submissions live at submissions/<id>/<version>/, so the atom dir is 3 path segments deep.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run: (re)publish every submission version directory.
            changed=$(find submissions -mindepth 2 -maxdepth 2 -type d | sort -u)
          else
            before="${{ github.event.before }}"
            # A first push (or zeroed/unreachable before) has no valid parent SHA; fall back to HEAD~1.
            git cat-file -e "${before}^{commit}" 2>/dev/null || before="$(git rev-parse HEAD~1)"
            changed=$(git diff --name-only "$before" "${{ github.sha }}" -- submissions/ \
              | cut -d/ -f1-3 | sort -u)
          fi
          [ -n "$changed" ] || { echo "No submission changes."; exit 0; }
          for dir in $changed; do
            [ -f "$dir/manifest.json" ] || continue
            id=$(node -p "JSON.parse(require('fs').readFileSync('$dir/manifest.json','utf8')).id")
            version=$(node -p "JSON.parse(require('fs').readFileSync('$dir/manifest.json','utf8')).version")
            tag="$id-v$version"
            asset="$id-$version.tgz"
            package_url="https://github.com/org-tinyatom/atoms-catalog/releases/download/$tag/$asset"
            node tools/publish-atom.mjs \
              --workspace "$dir" \
              --catalog atoms-catalog/catalog.json \
              --package-dir dist \
              --package-url "$package_url"
            gh release create "$tag" --repo org-tinyatom/atoms-catalog --title "$tag" --notes "Automated publish." || true
            gh release upload "$tag" "dist/$asset" --repo org-tinyatom/atoms-catalog --clobber
          done

      - name: Push the signed catalog
        working-directory: atoms-catalog
        run: |
          set -euo pipefail
          git add catalog.json
          if [ -f catalog.json.sig ]; then git add catalog.json.sig; fi
          if git diff --cached --quiet; then echo "Nothing published; catalog unchanged."; exit 0; fi
          git config user.name "tinyatom-publish"
          git config user.email "publish@tinyatom.invalid"
          git commit -m "Publish merged atoms"
          git push
