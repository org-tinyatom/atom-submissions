# Advisory checks on submission pull requests. This job holds NO secrets and never approves —
# a human owner still reviews and merges every submission. A red check is information, not a gate
# the submitter can't argue with. The checks script is vendored in this repo under tools/.
name: Submission checks

on:
  pull_request:
    paths: ['submissions/**']

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull request (with the vendored tools/)
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run advisory checks on changed submissions
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          # Direct two-commit diff (not "..."): the checkout is shallow, so there is no merge base.
          # Submissions live at submissions/<id>/<version>/ — 3 path segments to the atom dir.
          changed=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD -- submissions/ \
            | cut -d/ -f1-3 | sort -u)
          [ -n "$changed" ] || { echo "No submission changes."; exit 0; }
          status=0
          for dir in $changed; do
            [ -d "$dir" ] || continue
            echo "== $dir"
            node tools/check-atom-submission.mjs "$dir" || status=1
          done
          exit $status
