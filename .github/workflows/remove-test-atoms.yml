name: Remove test atoms

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: org-tinyatom/atoms-catalog
          token: ${{ secrets.CATALOG_PUSH_TOKEN }}

      - name: Remove and sign catalog entries
        env:
          TINYATOM_OWNER_PRIVATE_KEY_PEM: ${{ secrets.TINYATOM_OWNER_PRIVATE_KEY_PEM }}
        run: |
          node --input-type=module <<'NODE'
          import { sign } from "node:crypto";
          import { readFile, writeFile } from "node:fs/promises";

          const catalog = JSON.parse(await readFile("catalog.json", "utf8"));
          const removedIds = new Set(["autocuts-clips", "rekorder"]);
          catalog.atoms = catalog.atoms.filter((atom) => !removedIds.has(atom.id));
          catalog.generatedAt = new Date().toISOString();
          const text = `${JSON.stringify(catalog, null, 2)}\n`;
          const privateKey = process.env.TINYATOM_OWNER_PRIVATE_KEY_PEM?.trim();
          if (!privateKey) throw new Error("owner signing key is unavailable");
          const signature = sign(null, Buffer.from(text), privateKey).toString("base64");
          await writeFile("catalog.json", text);
          await writeFile("catalog.json.sig", `${signature}\n`);
          NODE

      - name: Publish empty catalog
        run: |
          git add catalog.json catalog.json.sig
          git config user.name "tinyatom-publish"
          git config user.email "publish@tinyatom.invalid"
          git commit -m "Remove test atoms from catalog"
          git push
